<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>cha_pictures 📷</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8f060;
    --accent-dim: #9bbf3a;
    --text: #f0f0f0;
    --text-muted: #888;
    --danger: #ff5c5c;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .header-logo span { color: var(--accent); }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 12px 20px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-accent { background: var(--accent); color: #0f0f0f; }
  .btn-accent:active { background: var(--accent-dim); transform: scale(0.97); }
  .btn-ghost { background: var(--surface2); color: var(--text); }
  .btn-ghost:active { background: var(--border); transform: scale(0.97); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-sm { padding: 8px 14px; font-size: 13px; }
  .btn-full { width: 100%; }
  .screen { display: none; }
  .screen.active { display: block; }

  /* LOGIN */
  #screen-login {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 40px 24px;
  }
  #screen-login.active { display: flex; }
  .login-emoji { font-size: 56px; margin-bottom: 16px; }
  .login-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px; }
  .login-title span { color: var(--accent); }
  .login-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 40px; }
  .login-form { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 12px; }
  .input {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-size: 16px; padding: 14px 16px; width: 100%; outline: none; transition: border 0.15s;
  }
  .input:focus { border-color: var(--accent); }
  .login-hint { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 4px; }

  /* ADMIN */
  #screen-admin { padding: 20px; }
  .section-title {
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px;
  }
  .create-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; margin-bottom: 28px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .create-row { display: flex; gap: 10px; align-items: center; }
  .create-card .input { flex: 1; font-size: 15px; padding: 12px 14px; }
  .album-list { display: flex; flex-direction: column; gap: 12px; }
  .album-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .album-card-top {
    padding: 16px 18px; display: flex; align-items: center; justify-content: space-between;
  }
  .album-info { flex: 1; min-width: 0; }
  .album-name { font-size: 16px; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .album-meta { font-size: 12px; color: var(--text-muted); }
  .album-code { font-size: 11px; color: var(--accent); margin-top: 2px; }
  .album-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .album-panel {
    display: none; border-top: 1px solid var(--border);
    padding: 16px 18px; background: var(--surface2);
  }
  .album-panel.open { display: block; }
  .panel-actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .photo-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 4px; border-radius: var(--radius-sm); overflow: hidden;
  }
  .photo-thumb { aspect-ratio: 1; object-fit: cover; width: 100%; cursor: pointer; }
  .photo-thumb-wrap { position: relative; }
  .photo-delete-btn {
    position: absolute; top: 4px; right: 4px;
    background: rgba(0,0,0,0.7); border: none; border-radius: 50%;
    width: 24px; height: 24px; color: #fff; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .upload-progress {
    background: var(--surface2); border-radius: var(--radius-sm);
    height: 4px; margin-top: 12px; overflow: hidden; display: none;
  }
  .upload-progress.show { display: block; }
  .upload-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

  /* QR 모달 */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
    padding: 28px 24px 40px; width: 100%; max-width: 480px; text-align: center;
  }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 24px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .modal-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
  #qr-container { background: #fff; border-radius: var(--radius-sm); padding: 16px; display: inline-block; margin-bottom: 20px; }
  .modal-url {
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 12px 14px; font-size: 12px; color: var(--text-muted);
    word-break: break-all; margin-bottom: 20px; text-align: left;
  }
  .modal-btns { display: flex; gap: 10px; }



  /* GALLERY */
  #screen-gallery { padding: 20px; padding-bottom: 120px; }
  .gallery-header { margin-bottom: 16px; }
  .gallery-title { font-size: 26px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 4px; }
  .gallery-count { font-size: 13px; color: var(--text-muted); }
  .gallery-toolbar {
    display: flex; gap: 8px; margin-bottom: 12px; align-items: center;
  }
  .select-count-badge { font-size: 13px; color: var(--accent); font-weight: 700; margin-left: auto; min-width: 60px; text-align: right; }
  .gallery-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 3px; border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 16px;
  }
  .gallery-item { aspect-ratio: 1; position: relative; overflow: hidden; cursor: pointer; }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.15s; pointer-events: none; }
  .gallery-item.selected img { opacity: 0.55; }
  .gallery-item.selected::after {
    content: '✓'; position: absolute; top: 6px; right: 6px;
    background: var(--accent); color: #0f0f0f; font-size: 13px; font-weight: 800;
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .download-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 14px 20px 32px; display: flex; gap: 10px; z-index: 150;
  }

  /* 업로드 모달 */
  .upload-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .upload-modal.open { display: flex; }
  .upload-modal-inner {
    background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
    padding: 28px 24px 40px; width: 100%; max-width: 480px;
  }
  .upload-modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .upload-modal-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .upload-drop-area {
    border: 2px dashed var(--border); border-radius: var(--radius-sm);
    padding: 32px 20px; text-align: center; cursor: pointer;
    margin-bottom: 16px; transition: border-color 0.15s;
  }
  .upload-drop-area:active { border-color: var(--accent); }
  .upload-drop-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-drop-text { font-size: 14px; color: var(--text-muted); }
  input[type="file"] { display: none; }

  /* LIGHTBOX */
  .lightbox {
    display: none; position: fixed; inset: 0; background: #000; z-index: 300;
    flex-direction: column; align-items: center; justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox-img { max-width: 100%; max-height: 80vh; object-fit: contain; }
  .lightbox-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    padding: 20px 24px 36px; display: flex; gap: 12px;
  }
  .lightbox-close {
    position: fixed; top: 20px; right: 20px;
    background: rgba(255,255,255,0.15); border: none; border-radius: 50%;
    width: 40px; height: 40px; color: #fff; font-size: 20px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  .toast {
    position: fixed; bottom: 100px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: #0f0f0f;
    font-size: 14px; font-weight: 600; padding: 12px 22px;
    border-radius: 99px; z-index: 999;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1); white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }
  .loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 200px; gap: 12px;
    color: var(--text-muted); font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .logout-btn { background: none; border: none; color: var(--text-muted); font-size: 13px; cursor: pointer; padding: 4px 8px; }
  .admin-create-bar {
    position: sticky; top: 57px; z-index: 90;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
  }
  .admin-create-row {
    display: flex; gap: 8px; align-items: center;
  }
  .admin-create-row .input {
    flex: 1; font-size: 14px; padding: 10px 12px;
  }
  .admin-create-row .btn {
    padding: 10px 16px; font-size: 14px; white-space: nowrap; flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- 메인 화면: 초대코드 중심 -->
<div id="screen-login" class="screen active">
  <div class="login-emoji">📷</div>
  <div class="login-title">cha<span>_pictures</span></div>
  <div class="login-sub">초대코드를 입력하고 사진을 공유하세요</div>
  <div class="login-form">
    <input class="input" type="text" id="invite-code-main" placeholder="초대코드 입력" style="text-align:center;font-size:20px;letter-spacing:2px;" />
    <button class="btn btn-accent btn-full" onclick="verifyCodeMain()">입장하기</button>
    <div class="login-hint" style="margin-top:16px;">
      <span onclick="toggleAdminForm()" style="cursor:pointer;text-decoration:underline;">관리자이신가요?</span>
    </div>
    <div id="admin-form" style="display:none; margin-top:8px;">
      <input class="input" type="password" id="login-pw" placeholder="관리자 비밀번호" style="margin-bottom:10px;" />
      <button class="btn btn-ghost btn-full" onclick="doLogin()">관리자 로그인</button>
    </div>
  </div>
</div>

<!-- 관리자 화면 -->
<div id="screen-admin" class="screen">
  <div class="header">
    <div class="header-logo">cha<span>_pictures</span></div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
  <!-- 상단 고정 입력창 -->
  <div class="admin-create-bar">
    <div class="admin-create-row">
      <input class="input" type="text" id="album-name-input" placeholder="앨범 이름" />
      <input class="input" type="text" id="album-code-input" placeholder="초대코드" />
      <button class="btn btn-accent" onclick="createAlbum()">만들기</button>
    </div>
  </div>
  <div style="padding: 16px 20px 20px;">
    <div class="section-title">앨범 목록</div>
    <div id="album-list" class="album-list">
      <div class="loading"><div class="spinner"></div>불러오는 중...</div>
    </div>
  </div>
</div>



<!-- 갤러리 (친구용) -->
<div id="screen-gallery" class="screen">
  <div class="header">
    <div class="header-logo">cha<span>_pictures</span></div>
    <button class="btn btn-accent btn-sm" onclick="openUploadModal()">📸 올리기</button>
  </div>
  <div style="padding: 20px; padding-bottom: 120px;">
    <div class="gallery-header">
      <div class="gallery-title" id="gallery-title">앨범</div>
      <div class="gallery-count" id="gallery-count">사진 불러오는 중...</div>
    </div>
    <div class="gallery-toolbar" id="gallery-toolbar" style="display:none">
      <span style="font-size:12px;color:var(--text-muted)" id="toolbar-hint">꾹 누르면 선택돼요</span>
      <button class="btn btn-ghost btn-sm" id="select-all-btn" onclick="selectAll()" style="display:none">전체선택</button>
      <button class="btn btn-danger btn-sm" id="select-cancel-btn" onclick="cancelSelect()" style="display:none">선택취소</button>
      <span class="select-count-badge" id="select-count-badge"></span>
    </div>
    <div id="gallery-grid" class="gallery-grid">
      <div class="loading" style="grid-column:span 3"><div class="spinner"></div></div>
    </div>
  </div>
  <div class="download-bar">
    <button class="btn btn-ghost btn-full" onclick="downloadAll()">📥 전체 저장</button>
    <button class="btn btn-accent btn-full" id="download-selected-btn" onclick="downloadSelected()" style="display:none">선택 저장 (<span id="selected-count">0</span>)</button>
  </div>
</div>

<!-- 업로드 모달 (친구용) -->
<div class="upload-modal" id="upload-modal">
  <div class="upload-modal-inner">
    <div class="modal-handle" style="width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 24px;"></div>
    <div class="upload-modal-title">📸 사진 올리기</div>
    <div class="upload-modal-sub">익명으로 업로드돼요. 여러 장 한번에 선택 가능!</div>
    <label class="upload-drop-area" for="friend-file-input">
      <div class="upload-drop-icon">🖼️</div>
      <div class="upload-drop-text">여기를 눌러 사진 선택</div>
    </label>
    <input type="file" id="friend-file-input" multiple accept="image/*" onchange="friendUpload(event)">
    <div class="upload-progress" id="friend-progress"><div class="upload-bar" id="friend-bar"></div></div>
    <button class="btn btn-ghost btn-full" onclick="closeUploadModal()" style="margin-top:12px">취소</button>
  </div>
</div>

<!-- QR 모달 -->
<div class="modal-bg" id="qr-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="qr-modal-title">QR 코드</div>
    <div class="modal-sub">초대코드와 함께 QR을 공유하세요</div>
    <div id="qr-container"></div>
    <div class="modal-url" id="qr-url"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost btn-full" onclick="closeQR()">닫기</button>
      <button class="btn btn-accent btn-full" onclick="saveQR()">QR 저장</button>
    </div>
  </div>
</div>

<!-- 라이트박스 -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="">
  <div class="lightbox-bar">
    <button class="btn btn-ghost btn-full" onclick="closeLightbox()">닫기</button>
    <button class="btn btn-accent btn-full" onclick="downloadCurrent()">📥 저장</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://xcwtulcjvewmamblhwwp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhjd3R1bGNqdmV3bWFtYmxod3dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzQzNjgsImV4cCI6MjA5NzgxMDM2OH0.8JRDAanhr2iVfIilIpZaRzU04Av82MPjeM8hcOxY1Fc';
const ADMIN_PW = '2015';
const BASE_URL = window.location.origin + window.location.pathname;

async function sbFetch(path, options = {}) {
  const res = await fetch(SUPABASE_URL + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(options.headers || {})
    }
  });
  return res;
}

async function getAlbums() {
  const res = await sbFetch('/rest/v1/albums?select=*,photos(count)&order=created_at.desc');
  return res.json();
}
async function getPhotos(albumId) {
  const res = await sbFetch(`/rest/v1/photos?album_id=eq.${albumId}&order=created_at.asc`);
  return res.json();
}
async function getAlbumByCode(code) {
  const res = await sbFetch(`/rest/v1/albums?invite_code=eq.${encodeURIComponent(code)}&select=*`);
  const data = await res.json();
  return data[0] || null;
}
async function insertAlbum(name, inviteCode) {
  const res = await sbFetch('/rest/v1/albums', {
    method: 'POST',
    body: JSON.stringify({ name, invite_code: inviteCode })
  });
  const data = await res.json();
  return data[0];
}
async function deleteAlbum(id) {
  await sbFetch(`/rest/v1/albums?id=eq.${id}`, { method: 'DELETE' });
}
async function insertPhoto(albumId, fileName, filePath) {
  await sbFetch('/rest/v1/photos', {
    method: 'POST',
    body: JSON.stringify({ album_id: albumId, file_name: fileName, file_path: filePath })
  });
}
async function deletePhoto(photoId, filePath) {
  await sbFetch(`/rest/v1/photos?id=eq.${photoId}`, { method: 'DELETE' });
  await sbFetch(`/storage/v1/object/photos/${filePath}`, { method: 'DELETE' });
}
function getPublicUrl(filePath) {
  return `${SUPABASE_URL}/storage/v1/object/public/photos/${filePath}`;
}
async function uploadFile(file, albumId) {
  const ext = file.name.split('.').pop();
  const filePath = `${albumId}/${Date.now()}_${Math.random().toString(36).substr(2,6)}.${ext}`;
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/photos/${filePath}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': file.type },
    body: file
  });
  if (!res.ok) throw new Error('업로드 실패');
  return filePath;
}

// ROUTING
function getAlbumIdFromUrl() {
  return new URLSearchParams(window.location.search).get('album');
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// ADMIN AUTH
function doLogin() {
  const pw = document.getElementById('login-pw').value;
  if (pw === ADMIN_PW) {
    sessionStorage.setItem('admin', '1');
    showAdmin();
  } else {
    showToast('비밀번호가 틀렸어요 🔐');
    document.getElementById('login-pw').value = '';
  }
}

function doLogout() { sessionStorage.removeItem('admin'); showScreen('login'); }

// ADMIN
async function showAdmin() {
  showScreen('admin');
  await loadAlbums();
}
async function loadAlbums() {
  const list = document.getElementById('album-list');
  list.innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  const albums = await getAlbums();
  if (!albums.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">앨범이 없어요. 첫 앨범을 만들어보세요!</div></div>';
    return;
  }
  list.innerHTML = albums.map(a => {
    const count = a.photos?.[0]?.count ?? 0;
    return `
    <div class="album-card" id="card-${a.id}">
      <div class="album-card-top">
        <div class="album-info">
          <div class="album-name">${a.name}</div>
          <div class="album-code">초대코드: ${a.invite_code || '없음'}</div>
          <div class="album-meta">사진 ${count}장</div>
        </div>
        <div class="album-actions">
          <button class="btn btn-ghost btn-sm" onclick="togglePanel('${a.id}')">열기</button>
          <button class="btn btn-sm" style="background:transparent;color:var(--text-muted);font-size:18px;padding:8px 6px" onclick="showQR('${a.id}','${a.name}')">⚡</button>
        </div>
      </div>
      <div class="album-panel" id="panel-${a.id}">
        <div class="panel-actions">
          <label class="btn btn-accent btn-sm" for="file-input-${a.id}">📸 사진 추가</label>
          <input type="file" id="file-input-${a.id}" multiple accept="image/*" onchange="uploadPhotos(event,'${a.id}')">
          <button class="btn btn-sm" style="background:transparent;color:var(--accent);border:1px solid var(--accent)" onclick="showQR('${a.id}','${a.name}')">🔗 QR 생성</button>
          <button class="btn btn-danger btn-sm" onclick="removeAlbum('${a.id}')">삭제</button>
        </div>
        <div class="upload-progress" id="progress-${a.id}"><div class="upload-bar" id="bar-${a.id}"></div></div>
        <div class="photo-grid" id="grid-${a.id}">
          <div class="loading" style="grid-column:span 3"><div class="spinner"></div></div>
        </div>
      </div>
    </div>`;
  }).join('');
}
async function togglePanel(albumId) {
  const panel = document.getElementById(`panel-${albumId}`);
  const isOpen = panel.classList.contains('open');
  document.querySelectorAll('.album-panel.open').forEach(p => p.classList.remove('open'));
  if (!isOpen) { panel.classList.add('open'); await loadAdminPhotos(albumId); }
}
async function loadAdminPhotos(albumId) {
  const grid = document.getElementById(`grid-${albumId}`);
  const photos = await getPhotos(albumId);
  if (!photos.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:span 3"><div class="empty-icon">🖼️</div><div class="empty-text">사진을 추가해보세요</div></div>';
    return;
  }
  grid.innerHTML = photos.map(p => `
    <div class="photo-thumb-wrap">
      <img class="photo-thumb" src="${getPublicUrl(p.file_path)}" loading="lazy" />
      <button class="photo-delete-btn" onclick="removePhoto('${p.id}','${p.file_path}','${albumId}')">✕</button>
    </div>
  `).join('');
}
async function createAlbum() {
  const nameInput = document.getElementById('album-name-input');
  const codeInput = document.getElementById('album-code-input');
  const name = nameInput.value.trim();
  const code = codeInput.value.trim();
  if (!name) { showToast('앨범 이름을 입력해줘!'); return; }
  if (!code) { showToast('초대코드를 입력해줘!'); return; }
  nameInput.disabled = codeInput.disabled = true;
  await insertAlbum(name, code);
  nameInput.value = codeInput.value = '';
  nameInput.disabled = codeInput.disabled = false;
  showToast(`"${name}" 앨범 만들었어! 🎉`);
  await loadAlbums();
}
async function uploadPhotos(event, albumId) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  const progress = document.getElementById(`progress-${albumId}`);
  const bar = document.getElementById(`bar-${albumId}`);
  progress.classList.add('show');
  for (let i = 0; i < files.length; i++) {
    bar.style.width = ((i / files.length) * 100) + '%';
    try {
      const filePath = await uploadFile(files[i], albumId);
      await insertPhoto(albumId, files[i].name, filePath);
    } catch(e) { showToast('업로드 실패 😢'); }
  }
  bar.style.width = '100%';
  setTimeout(() => { progress.classList.remove('show'); bar.style.width = '0%'; }, 500);
  showToast(`${files.length}장 업로드 완료! 📸`);
  event.target.value = '';
  await loadAdminPhotos(albumId);
  await loadAlbums();
}
async function removeAlbum(albumId) {
  if (!confirm('앨범을 삭제할까요? 사진도 모두 삭제돼요.')) return;
  await deleteAlbum(albumId);
  showToast('앨범 삭제했어요');
  await loadAlbums();
}
async function removePhoto(photoId, filePath, albumId) {
  await deletePhoto(photoId, filePath);
  showToast('사진 삭제했어요');
  await loadAdminPhotos(albumId);
  await loadAlbums();
}

// QR
function showQR(albumId, albumName) {
  const url = `${BASE_URL}?album=${albumId}`;
  document.getElementById('qr-modal-title').textContent = `${albumName}`;
  document.getElementById('qr-url').textContent = url;
  document.getElementById('qr-container').innerHTML = '';
  new QRCode(document.getElementById('qr-container'), { text: url, width: 200, height: 200, colorDark: '#0f0f0f', colorLight: '#ffffff' });
  document.getElementById('qr-modal').classList.add('open');
}
function closeQR() { document.getElementById('qr-modal').classList.remove('open'); }
function saveQR() {
  const canvas = document.querySelector('#qr-container canvas');
  if (!canvas) return;
  const a = document.createElement('a');
  a.href = canvas.toDataURL();
  a.download = 'qr_cha_pictures.png';
  a.click();
  showToast('QR 저장했어요! 📲');
}
document.getElementById('qr-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeQR(); });

// INVITE (친구용 초대코드 검증)
let currentAlbumId = null;

function toggleAdminForm() {
  const form = document.getElementById('admin-form');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

async function verifyCodeMain() {
  const code = document.getElementById('invite-code-main').value.trim();
  if (!code) { showToast('초대코드를 입력해줘!'); return; }
  const album = await getAlbumByCode(code);
  if (!album) {
    showToast('초대코드가 맞지 않아요 🔐');
    document.getElementById('invite-code-main').value = '';
    return;
  }
  currentAlbumId = album.id;
  sessionStorage.setItem('albumId', album.id);
  sessionStorage.setItem('albumName', album.name);
  await showGallery(album.id, album.name);
}



document.getElementById('invite-code-main').addEventListener('keydown', e => { if (e.key === 'Enter') verifyCodeMain(); });
document.getElementById('login-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// GALLERY
let galleryPhotos = [];
let currentPhotoIdx = 0;
let selectMode = false;
let selectedSet = new Set();

async function showGallery(albumId, albumName) {
  currentAlbumId = albumId;
  showScreen('gallery');
  if (!albumName) {
    const res = await sbFetch(`/rest/v1/albums?id=eq.${albumId}&select=name`);
    const data = await res.json();
    albumName = data[0]?.name ?? '앨범';
  }
  document.getElementById('gallery-title').textContent = albumName;
  await loadGalleryPhotos(albumId);
}

async function loadGalleryPhotos(albumId) {
  const photos = await getPhotos(albumId);
  galleryPhotos = photos;
  document.getElementById('gallery-count').textContent = `사진 ${photos.length}장`;
  renderGallery();
  if (photos.length) document.getElementById('gallery-toolbar').style.display = 'flex';
}

function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  if (!galleryPhotos.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:span 3"><div class="empty-icon">🖼️</div><div class="empty-text">아직 사진이 없어요<br>첫 사진을 올려보세요!</div></div>';
    return;
  }
  grid.innerHTML = galleryPhotos.map((p, i) => `
    <div class="gallery-item ${selectedSet.has(i) ? 'selected' : ''}" id="gitem-${i}"
      onclick="handleTap(${i})"
      ontouchstart="startLongPress(${i})"
      ontouchend="cancelLongPress()"
      ontouchmove="cancelLongPress()">
      <img src="${getPublicUrl(p.file_path)}" loading="lazy" />
    </div>
  `).join('');
}

// LONG PRESS
let longPressTimer = null;
function startLongPress(idx) {
  longPressTimer = setTimeout(() => {
    if (!selectMode) enterSelectMode();
    selectedSet.add(idx);
    updateSelectUI();
  }, 500);
}
function cancelLongPress() { clearTimeout(longPressTimer); }

function handleTap(idx) {
  if (selectMode) {
    if (selectedSet.has(idx)) selectedSet.delete(idx);
    else selectedSet.add(idx);
    updateSelectUI();
  } else {
    openLightbox(idx);
  }
}

function enterSelectMode() {
  selectMode = true;
  document.getElementById('select-all-btn').style.display = 'inline-flex';
  document.getElementById('select-cancel-btn').style.display = 'inline-flex';
  document.getElementById('download-selected-btn').style.display = 'inline-flex';
  document.getElementById('toolbar-hint').style.display = 'none';
}
function cancelSelect() {
  selectMode = false;
  selectedSet.clear();
  document.getElementById('select-all-btn').style.display = 'none';
  document.getElementById('select-cancel-btn').style.display = 'none';
  document.getElementById('download-selected-btn').style.display = 'none';
  document.getElementById('toolbar-hint').style.display = '';
  updateSelectUI();
}
function selectAll() {
  if (selectedSet.size === galleryPhotos.length) selectedSet.clear();
  else galleryPhotos.forEach((_, i) => selectedSet.add(i));
  updateSelectUI();
}
function updateSelectUI() {
  galleryPhotos.forEach((_, i) => {
    const el = document.getElementById(`gitem-${i}`);
    if (el) el.classList.toggle('selected', selectedSet.has(i));
  });
  const count = selectedSet.size;
  document.getElementById('selected-count').textContent = count;
  document.getElementById('select-count-badge').textContent = selectMode && count > 0 ? `${count}장 선택됨` : '';
  const allBtn = document.getElementById('select-all-btn');
  if (allBtn.style.display !== 'none') {
    allBtn.textContent = selectedSet.size === galleryPhotos.length ? '전체해제' : '전체선택';
  }
}

// 친구 업로드
function openUploadModal() { document.getElementById('upload-modal').classList.add('open'); }
function closeUploadModal() { document.getElementById('upload-modal').classList.remove('open'); }
document.getElementById('upload-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeUploadModal(); });

async function friendUpload(event) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  const progress = document.getElementById('friend-progress');
  const bar = document.getElementById('friend-bar');
  progress.classList.add('show');
  for (let i = 0; i < files.length; i++) {
    bar.style.width = ((i / files.length) * 100) + '%';
    try {
      const filePath = await uploadFile(files[i], currentAlbumId);
      await insertPhoto(currentAlbumId, files[i].name, filePath);
    } catch(e) { showToast('업로드 실패 😢'); }
  }
  bar.style.width = '100%';
  setTimeout(() => { progress.classList.remove('show'); bar.style.width = '0%'; }, 500);
  event.target.value = '';
  closeUploadModal();
  showToast(`${files.length}장 올렸어요! 📸`);
  await loadGalleryPhotos(currentAlbumId);
}

// LIGHTBOX
function openLightbox(idx) {
  currentPhotoIdx = idx;
  document.getElementById('lightbox-img').src = getPublicUrl(galleryPhotos[idx].file_path);
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
function downloadCurrent() {
  const p = galleryPhotos[currentPhotoIdx];
  downloadImage(getPublicUrl(p.file_path), p.file_name);
}

// DOWNLOAD
async function downloadAll() {
  showToast('전체 저장 시작! 📥');
  for (let i = 0; i < galleryPhotos.length; i++) {
    await downloadImage(getPublicUrl(galleryPhotos[i].file_path), galleryPhotos[i].file_name);
    await new Promise(r => setTimeout(r, 800));
  }
  showToast('전체 저장 완료! 🎉');
}
async function downloadSelected() {
  if (selectedSet.size === 0) { showToast('사진을 선택해줘!'); return; }
  const indices = Array.from(selectedSet).sort((a,b) => a-b);
  showToast(`${indices.length}장 저장 시작! 📥`);
  for (const idx of indices) {
    await downloadImage(getPublicUrl(galleryPhotos[idx].file_path), galleryPhotos[idx].file_name);
    await new Promise(r => setTimeout(r, 800));
  }
  showToast(`${indices.length}장 저장 완료! 🎉`);
  cancelSelect();
}
async function downloadImage(url, name) {
  const dlUrl = url + '?download=' + encodeURIComponent(name || 'photo.jpg');
  const a = document.createElement('a');
  a.href = dlUrl;
  a.download = name || 'photo.jpg';
  a.target = '_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  await new Promise(r => setTimeout(r, 800));
}

// TOAST
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1200);
}

// INIT
const albumIdFromUrl = getAlbumIdFromUrl();
if (albumIdFromUrl) {
  // QR 스캔으로 접속 → 메인 화면(초대코드 입력)
  showScreen('login');
} else if (sessionStorage.getItem('admin')) {
  showAdmin();
} else if (sessionStorage.getItem('albumId')) {
  // 세션에 앨범 정보 있으면 바로 갤러리
  showGallery(sessionStorage.getItem('albumId'), sessionStorage.getItem('albumName'));
} else {
  showScreen('login');
}
</script>
